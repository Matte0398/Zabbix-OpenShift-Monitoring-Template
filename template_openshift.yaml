zabbix_export:
  version: "7.0"
  template_groups:
    - uuid: 740f23489157459294ce211f5f3df96e
      name: Templates/Applications
  templates:
    - uuid: 9c7a805f5a4f4a86ad26d73c89482ab9
      template: "Template OpenShift Cluster by Thanos API"
      name: "Template OpenShift Cluster by Thanos API"
      description: |
        Template for monitoring OpenShift clusters through the Thanos Query API.

        This template uses PromQL-based HTTP agent items, dependent items and LLD rules to detect problematic or critical OpenShift resources. It is designed to reduce HTTP requests, limit unnecessary object discovery and focus monitoring on actionable conditions.

        Author: Matteo Z.
      groups:
        - name: Templates/Applications
      items:
        - uuid: 2f052ab4eb7c4b4983a4e2ef27b6d4d5
          name: "OCP: Critical ClusterOperators raw"
          type: HTTP_AGENT
          key: ocp.critical.clusteroperators.raw
          delay: 5m
          history: "0"
          value_type: TEXT
          timeout: 30s
          url: "{$OCP.THANOS.URL}/api/v1/query"
          query_fields:
            - name: query
              value: '(cluster_operator_conditions{condition="Available",status!="True"} == 1) or (cluster_operator_conditions{condition=~"Degraded|Progressing",status="True"} == 1)'
          headers:
            - name: Authorization
              value: "Bearer {$OCP.TOKEN}"
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
        - uuid: 294654738e844f0fac95b08efee9990b
          name: "OCP: Critical Jobs status raw"
          type: HTTP_AGENT
          key: ocp.critical.jobs.status.raw
          delay: 5m
          history: "0"
          value_type: TEXT
          timeout: 30s
          url: "{$OCP.THANOS.URL}/api/v1/query"
          query_fields:
            - name: query
              value: 'label_replace((kube_job_status_failed>0) or (((time()-kube_job_status_start_time) and on(namespace,job_name) (kube_job_status_active>0))>={$OCP.JOB.MAX.RUN.TIME}),"check","any","job_name",".*") or label_replace(kube_job_status_failed>0,"check","failed","job_name",".*") or label_replace(((time()-kube_job_status_start_time) and on(namespace,job_name) (kube_job_status_active>0))>={$OCP.JOB.MAX.RUN.TIME},"check","longrunning","job_name",".*")'
          headers:
            - name: Authorization
              value: "Bearer {$OCP.TOKEN}"
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
        - uuid: cc15db9d3a104cc6a3c105a755389704
          name: "OCP: Critical Node filesystems raw"
          type: HTTP_AGENT
          key: ocp.critical.node.filesystems.raw
          delay: 5m
          history: "0"
          value_type: TEXT
          timeout: 30s
          url: "{$OCP.THANOS.URL}/api/v1/query"
          query_fields:
            - name: query
              value: "100 * (1 - node_filesystem_avail_bytes/node_filesystem_size_bytes) >= {$OCP.NODE.FS.WARN}"
          headers:
            - name: Authorization
              value: "Bearer {$OCP.TOKEN}"
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
        - uuid: cdcf928c8c154144891cd3f1d026ef30
          name: "OCP: Critical Nodes status raw"
          type: HTTP_AGENT
          key: ocp.critical.nodes.status.raw
          delay: 5m
          history: "0"
          value_type: TEXT
          timeout: 30s
          url: "{$OCP.THANOS.URL}/api/v1/query"
          query_fields:
            - name: query
              value: 'label_replace(max by (node) ((kube_node_status_condition{condition="Ready",status=~"false|unknown"} == 1) or (kube_node_spec_unschedulable == 1)), "check", "any", "node", ".*") or label_replace(max by (node) (kube_node_status_condition{condition="Ready",status=~"false|unknown"} == 1), "check", "not_ready", "node", ".*") or label_replace(max by (node) (kube_node_spec_unschedulable == 1), "check", "unschedulable", "node", ".*")'
          headers:
            - name: Authorization
              value: "Bearer {$OCP.TOKEN}"
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
        - uuid: 0a42b76780644740b38a2c4b8a6f78ad
          name: "OCP: Critical Pods status raw"
          type: HTTP_AGENT
          key: ocp.critical.pods.status.raw
          delay: 5m
          history: "0"
          value_type: TEXT
          timeout: 30s
          url: "{$OCP.THANOS.URL}/api/v1/query"
          query_fields:
            - name: query
              value: 'label_replace((max by(namespace,pod)((kube_pod_status_phase{phase=~"Pending|Failed|Unknown"}==1) or (kube_pod_status_unschedulable==1) or (kube_pod_status_ready{condition="false"}==1) or (kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}==1))>0) or (sum by(namespace,pod)(increase(kube_pod_container_status_restarts_total[15m]))>={$OCP.POD.RESTARTS.WARN}),"check","any","pod",".*") or label_replace(max by(namespace,pod)((kube_pod_status_phase{phase=~"Pending|Failed|Unknown"}==1) or (kube_pod_status_unschedulable==1) or (kube_pod_status_ready{condition="false"}==1) or (kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}==1))>0,"check","problem_state","pod",".*") or label_replace(sum by(namespace,pod)(increase(kube_pod_container_status_restarts_total[15m]))>={$OCP.POD.RESTARTS.WARN},"check","restarts","pod",".*")'
          headers:
            - name: Authorization
              value: "Bearer {$OCP.TOKEN}"
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
        - uuid: e0dcb2bec848470ca10758b0a5c1546a
          name: "OCP: Critical PV status raw"
          type: HTTP_AGENT
          key: ocp.critical.pv.status.raw
          delay: 5m
          history: "0"
          value_type: TEXT
          timeout: 30s
          url: "{$OCP.THANOS.URL}/api/v1/query"
          query_fields:
            - name: query
              value: 'label_replace((kube_persistentvolume_status_phase{phase="Failed"}==1) or (kube_persistentvolume_deletion_timestamp>0),"check","any","persistentvolume",".*") or label_replace(kube_persistentvolume_status_phase{phase="Failed"}==1,"check","failed","persistentvolume",".*") or label_replace(kube_persistentvolume_deletion_timestamp>0,"check","terminating","persistentvolume",".*")'
          headers:
            - name: Authorization
              value: "Bearer {$OCP.TOKEN}"
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
        - uuid: 197f932373a24adebd67968721159324
          name: "OCP: Critical PVC usage raw"
          type: HTTP_AGENT
          key: ocp.critical.pvc.usage.raw
          delay: 5m
          history: "0"
          value_type: TEXT
          timeout: 30s
          url: "{$OCP.THANOS.URL}/api/v1/query"
          query_fields:
            - name: query
              value: "100 * (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) >= {$OCP.PVC.WARN}"
          headers:
            - name: Authorization
              value: "Bearer {$OCP.TOKEN}"
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
        - uuid: 00547118bada44bf8a425221926a7773
          name: "OCP: Critical ResourceQuota usage raw"
          type: HTTP_AGENT
          key: ocp.critical.resourcequota.usage.raw
          delay: 10m
          history: "0"
          value_type: TEXT
          timeout: 30s
          url: "{$OCP.THANOS.URL}/api/v1/query"
          query_fields:
            - name: query
              value: '((100 * kube_resourcequota{type="used"} / on(namespace,resourcequota,resource) kube_resourcequota{type="hard"}) and on(namespace,resourcequota,resource) (kube_resourcequota{type="hard"} > 0)) >= {$OCP.RQ.WARN}'
          headers:
            - name: Authorization
              value: "Bearer {$OCP.TOKEN}"
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
        - uuid: 10230a87dbb3480e8330f9369612b78f
          name: "OCP: Critical Routes status raw"
          type: HTTP_AGENT
          key: ocp.critical.routes.status.raw
          delay: 5m
          history: "0"
          value_type: TEXT
          timeout: 30s
          url: "{$OCP.THANOS.URL}/api/v1/query"
          query_fields:
            - name: query
              value: '((openshift_route_status{type="Admitted",status="True"} == bool 0) == 1)'
          headers:
            - name: Authorization
              value: "Bearer {$OCP.TOKEN}"
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
        - uuid: f15a4051d3dd401cac477d251a68f5b2
          name: "OCP: Critical Service endpoints status raw"
          type: HTTP_AGENT
          key: ocp.critical.services.endpoints.status.raw
          delay: 5m
          history: "0"
          value_type: TEXT
          timeout: 30s
          url: "{$OCP.THANOS.URL}/api/v1/query"
          query_fields:
            - name: query
              value: 'label_replace((kube_endpoint_info unless on(namespace,endpoint)(sum by(namespace,endpoint)(kube_endpoint_address_available)>0)) or (sum by(namespace,endpoint)(kube_endpoint_address_not_ready)>0),"check","any","endpoint",".*") or label_replace(kube_endpoint_info unless on(namespace,endpoint)(sum by(namespace,endpoint)(kube_endpoint_address_available)>0),"check","no_available","endpoint",".*") or label_replace(sum by(namespace,endpoint)(kube_endpoint_address_not_ready)>0,"check","not_ready","endpoint",".*")'
          headers:
            - name: Authorization
              value: "Bearer {$OCP.TOKEN}"
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
        - uuid: 3a2062e8f9fb4f94a92b7a2308a556f4
          name: "OCP: Etcd members status raw"
          type: HTTP_AGENT
          key: ocp.etcd.members.status.raw
          delay: 5m
          history: "0"
          value_type: TEXT
          timeout: 30s
          url: "{$OCP.THANOS.URL}/api/v1/query"
          query_fields:
            - name: query
              value: 'label_replace(up{job=~".*etcd.*"},"check","target_up","instance",".*") or label_replace(etcd_server_has_leader,"check","has_leader","instance",".*")'
          headers:
            - name: Authorization
              value: "Bearer {$OCP.TOKEN}"
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
        - uuid: 1b03fa4d7d0a429cb390f16f982d8ca2
          name: "OCP: Etcd request latency p99"
          type: HTTP_AGENT
          key: ocp.etcd.request.latency.p99
          delay: 5m
          value_type: FLOAT
          units: s
          preprocessing:
            - type: JSONPATH
              parameters:
                - "$.data.result[0].value[1]"
              error_handler: CUSTOM_VALUE
              error_handler_params: "0"
          timeout: 30s
          url: "{$OCP.THANOS.URL}/api/v1/query"
          query_fields:
            - name: query
              value: "histogram_quantile(0.99, sum(rate(etcd_request_duration_seconds_bucket[10m])) by (le)) or vector(0)"
          headers:
            - name: Authorization
              value: "Bearer {$OCP.TOKEN}"
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
          triggers:
            - uuid: 41df1cb1d2144e99be98a44fef359dd0
              expression: "min(/Template OpenShift Cluster by Thanos API/ocp.etcd.request.latency.p99,10m)>{$OCP.ETCD.LATENCY.P99.WARN}"
              name: "OCP: Etcd request latency p99 is high"
              priority: AVERAGE
              manual_close: "YES"
              tags:
                - tag: impact
                  value: performance
        - uuid: 067696e66aa84d97ac84402c9ea43d81
          name: "OCP: Thanos query health"
          type: HTTP_AGENT
          key: ocp.thanos.query.health
          delay: 3m
          preprocessing:
            - type: JSONPATH
              parameters:
                - "$.data.result[0].value[1]"
              error_handler: CUSTOM_VALUE
              error_handler_params: "0"
          timeout: 30s
          url: "{$OCP.THANOS.URL}/api/v1/query"
          query_fields:
            - name: query
              value: vector(1)
          headers:
            - name: Authorization
              value: "Bearer {$OCP.TOKEN}"
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
          triggers:
            - uuid: 7f23cf7de1b640839b4430370b7a4fcd
              expression: "max(/Template OpenShift Cluster by Thanos API/ocp.thanos.query.health,5m)<>1"
              name: "OCP: Thanos query API is not healthy"
              priority: HIGH
              manual_close: "YES"
              tags:
                - tag: impact
                  value: availability
      discovery_rules:
        - uuid: 7603c476a0f24891a389f0769dd3aee7
          name: "OCP Critical ClusterOperator Discovery"
          type: DEPENDENT
          key: ocp.critical.clusteroperator.discovery
          lifetime: 1h
          item_prototypes:
            - uuid: 4ca11600a0204ff3a1ae35ff93e58760
              name: "ClusterOperator {#CO}: {#CO_CONDITION} status {#CO_STATUS}"
              type: DEPENDENT
              key: "ocp.clusteroperator.critical[{#CO},{#CO_CONDITION},{#CO_STATUS}]"
              valuemap:
                name: "OCP status: OK / Problem"
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.data.result[?(@.metric.name=="{#CO}" && @.metric.condition=="{#CO_CONDITION}" && @.metric.status=="{#CO_STATUS}")].value[1].first()'
                  error_handler: CUSTOM_VALUE
                  error_handler_params: "0"
              master_item:
                key: ocp.critical.clusteroperators.raw
              tags:
                - tag: object
                  value: clusteroperators
              trigger_prototypes:
                - uuid: 1c87e9edb64d4c578375070c290d47a6
                  expression: "min(/Template OpenShift Cluster by Thanos API/ocp.clusteroperator.critical[{#CO},{#CO_CONDITION},{#CO_STATUS}],5m)>0"
                  name: "ClusterOperator {#CO}: {#CO_CONDITION} status {#CO_STATUS}"
                  priority: HIGH
                  manual_close: "YES"
                  tags:
                    - tag: impact
                      value: availability
          master_item:
            key: ocp.critical.clusteroperators.raw
          lld_macro_paths:
            - lld_macro: "{#CO_CONDITION}"
              path: $.condition
            - lld_macro: "{#CO_REASON}"
              path: $.reason
            - lld_macro: "{#CO_STATUS}"
              path: $.status
            - lld_macro: "{#CO}"
              path: $.name
          preprocessing:
            - type: JSONPATH
              parameters:
                - "$.data.result[*].metric"
              error_handler: CUSTOM_VALUE
              error_handler_params: "[]"
        - uuid: 4476debf40434caf85ef86941cbdb431
          name: "OCP Critical Job Status Discovery"
          type: DEPENDENT
          key: ocp.critical.job.status.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: "{#NAMESPACE}"
                value: "{$OCP.JOB.NS.MATCHES}"
              - macro: "{#NAMESPACE}"
                value: "{$OCP.NS.NOT_MATCHES}"
                operator: NOT_MATCHES_REGEX
          lifetime: 1h
          item_prototypes:
            - uuid: 3df32ce979e94968af6b46951d47b087
              name: "Job {#NAMESPACE}/{#JOB}: Failed count"
              type: DEPENDENT
              key: "ocp.critical.job.failed[{#NAMESPACE},{#JOB}]"
              history: "0"
              value_type: FLOAT
              trends: "0"
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.data.result[?(@.metric.namespace=="{#NAMESPACE}" && @.metric.job_name=="{#JOB}" && @.metric.check=="failed")].value[1].first()'
                  error_handler: CUSTOM_VALUE
                  error_handler_params: "0"
              master_item:
                key: ocp.critical.jobs.status.raw
              tags:
                - tag: object
                  value: job
              trigger_prototypes:
                - uuid: 1eb4f1e7443c43f19dc73eea25934b26
                  expression: "last(/Template OpenShift Cluster by Thanos API/ocp.critical.job.failed[{#NAMESPACE},{#JOB}])>0"
                  name: "Job {#NAMESPACE}/{#JOB}: Failed"
                  priority: AVERAGE
                  manual_close: "YES"
                  tags:
                    - tag: impact
                      value: availability
            - uuid: 86594a5d0e1a4d34bb5a9c0236890c9a
              name: "Job {#NAMESPACE}/{#JOB}: Running seconds"
              type: DEPENDENT
              key: "ocp.critical.job.running.seconds[{#NAMESPACE},{#JOB}]"
              history: "0"
              value_type: FLOAT
              trends: "0"
              units: s
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.data.result[?(@.metric.namespace=="{#NAMESPACE}" && @.metric.job_name=="{#JOB}" && @.metric.check=="longrunning")].value[1].first()'
                  error_handler: CUSTOM_VALUE
                  error_handler_params: "0"
              master_item:
                key: ocp.critical.jobs.status.raw
              tags:
                - tag: object
                  value: job
              trigger_prototypes:
                - uuid: 94113f18ef384d99867538783e49bf87
                  expression: "last(/Template OpenShift Cluster by Thanos API/ocp.critical.job.running.seconds[{#NAMESPACE},{#JOB}])>={$OCP.JOB.MAX.RUN.TIME}"
                  name: "Job {#NAMESPACE}/{#JOB}: Running for more than {$OCP.JOB.MAX.RUN.TIME} seconds"
                  priority: AVERAGE
                  manual_close: "YES"
                  tags:
                    - tag: impact
                      value: performance
          master_item:
            key: ocp.critical.jobs.status.raw
          lld_macro_paths:
            - lld_macro: "{#JOB}"
              path: $.job_name
            - lld_macro: "{#NAMESPACE}"
              path: $.namespace
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.data.result[?(@.metric.check=="any")].metric'
              error_handler: CUSTOM_VALUE
              error_handler_params: "[]"
        - uuid: 4b9be415394c4e8db2460caa71c04aac
          name: "OCP Critical Node Filesystem Discovery"
          type: DEPENDENT
          key: ocp.critical.node.filesystem.discovery
          filter:
            conditions:
              - macro: "{#FS_DEVICE}"
                value: "{$OCP.NODE.FS.DEVICE.NOT_MATCHES}"
                operator: NOT_MATCHES_REGEX
              - macro: "{#FS_FSTYPE}"
                value: "{$OCP.NODE.FS.FSTYPE.NOT_MATCHES}"
                operator: NOT_MATCHES_REGEX
              - macro: "{#FS_MOUNTPOINT}"
                value: "{$OCP.NODE.FS.MOUNTPOINT.NOT_MATCHES}"
                operator: NOT_MATCHES_REGEX
          lifetime: 1d
          item_prototypes:
            - uuid: 492108f815e74b85b8a30a5ec12f7023
              name: "Node {#NODE_INSTANCE}: Filesystem {#FS_MOUNTPOINT} used %"
              type: DEPENDENT
              key: "ocp.critical.node.fs.used.percent[{#NODE_INSTANCE},{#FS_DEVICE},{#FS_MOUNTPOINT}]"
              history: 14d
              value_type: FLOAT
              trends: "0"
              units: "%"
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.data.result[?(@.metric.instance=="{#NODE_INSTANCE}" && @.metric.device=="{#FS_DEVICE}" && @.metric.mountpoint=="{#FS_MOUNTPOINT}")].value[1].first()'
                  error_handler: CUSTOM_VALUE
                  error_handler_params: "0"
              master_item:
                key: ocp.critical.node.filesystems.raw
              tags:
                - tag: object
                  value: node_filesystem
              trigger_prototypes:
                - uuid: c498798402194930875289954a94a858
                  expression: "min(/Template OpenShift Cluster by Thanos API/ocp.critical.node.fs.used.percent[{#NODE_INSTANCE},{#FS_DEVICE},{#FS_MOUNTPOINT}],10m)>={$OCP.NODE.FS.CRIT}"
                  name: "Node {#NODE_INSTANCE}: Filesystem {#FS_MOUNTPOINT} used space is critical"
                  priority: HIGH
                  manual_close: "YES"
                  tags:
                    - tag: impact
                      value: capacity
                - uuid: 838f95a322f945fd9ab6ea46f155f3c5
                  expression: "min(/Template OpenShift Cluster by Thanos API/ocp.critical.node.fs.used.percent[{#NODE_INSTANCE},{#FS_DEVICE},{#FS_MOUNTPOINT}],10m)>={$OCP.NODE.FS.WARN}"
                  name: "Node {#NODE_INSTANCE}: Filesystem {#FS_MOUNTPOINT} used space is warning"
                  priority: WARNING
                  manual_close: "YES"
                  tags:
                    - tag: impact
                      value: capacity
          master_item:
            key: ocp.critical.node.filesystems.raw
          lld_macro_paths:
            - lld_macro: "{#FS_DEVICE}"
              path: $.device
            - lld_macro: "{#FS_FSTYPE}"
              path: $.fstype
            - lld_macro: "{#FS_MOUNTPOINT}"
              path: $.mountpoint
            - lld_macro: "{#NODE_INSTANCE}"
              path: $.instance
          preprocessing:
            - type: JSONPATH
              parameters:
                - "$.data.result[*].metric"
              error_handler: CUSTOM_VALUE
              error_handler_params: "[]"
        - uuid: e5999cdc7f6d4c8cac103c19b706764d
          name: "OCP Critical Node Status Discovery"
          type: DEPENDENT
          key: ocp.critical.node.status.discovery
          lifetime: 1h
          item_prototypes:
            - uuid: 181278a66b714f068d2b924586d12e41
              name: "Node {#NODE}: Not ready"
              type: DEPENDENT
              key: "ocp.critical.node.not_ready[{#NODE}]"
              history: 7d
              trends: "0"
              valuemap:
                name: "OCP status: OK / Problem"
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.data.result[?(@.metric.node=="{#NODE}" && @.metric.check=="not_ready")].value[1].first()'
                  error_handler: CUSTOM_VALUE
                  error_handler_params: "0"
              master_item:
                key: ocp.critical.nodes.status.raw
              tags:
                - tag: object
                  value: node
              trigger_prototypes:
                - uuid: 00901cc7a8a14e4e9a928d13954da55f
                  expression: "last(/Template OpenShift Cluster by Thanos API/ocp.critical.node.not_ready[{#NODE}])=1"
                  name: "Node {#NODE}: Not ready"
                  priority: HIGH
                  manual_close: "YES"
                  tags:
                    - tag: impact
                      value: availability
            - uuid: ab58a771c76741b3855af148c8171c99
              name: "Node {#NODE}: Unschedulable"
              type: DEPENDENT
              key: "ocp.node.unschedulable[{#NODE}]"
              history: 7d
              trends: "0"
              valuemap:
                name: "OCP status: Yes / No"
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.data.result[?(@.metric.node=="{#NODE}" && @.metric.check=="unschedulable")].value[1].first()'
                  error_handler: CUSTOM_VALUE
                  error_handler_params: "0"
              master_item:
                key: ocp.critical.nodes.status.raw
              tags:
                - tag: object
                  value: node
              trigger_prototypes:
                - uuid: 9fadb4a0ac99439985c083d8b058116f
                  expression: "max(/Template OpenShift Cluster by Thanos API/ocp.node.unschedulable[{#NODE}],10m)=1"
                  name: "Node {#NODE}: Unschedulable"
                  priority: AVERAGE
                  manual_close: "YES"
                  tags:
                    - tag: impact
                      value: performance
          master_item:
            key: ocp.critical.nodes.status.raw
          lld_macro_paths:
            - lld_macro: "{#NODE}"
              path: $.node
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.data.result[?(@.metric.check=="any")].metric'
              error_handler: CUSTOM_VALUE
              error_handler_params: "[]"
        - uuid: aeb73d1e16d94106ab88629cfbdb6d48
          name: "OCP Critical Pod Status Discovery"
          type: DEPENDENT
          key: ocp.critical.pod.status.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: "{#NAMESPACE}"

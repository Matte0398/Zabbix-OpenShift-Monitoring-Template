zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 740f23489157459294ce211f5f3df96e
      name: Templates/Applications
  templates:
    - uuid: 434812a76faf4708982a7f746dd0460b
      template: 'Template OpenShift Cluster by Thanos API'
      name: 'Template OpenShift Cluster by Thanos API'
      description: |
        Template for monitoring OpenShift clusters through the Thanos API.
        
        The template focuses mainly on problem-oriented monitoring and discovers resources only when relevant warning or critical conditions are detected. This helps reduce HTTP requests, discovered objects, item count and overall load on both Zabbix and the OpenShift monitoring stack.
        
        Some checks, such as Thanos query health and aggregate etcd latency, are intentionally always evaluated because they validate the monitoring path or provide cluster-level control-plane indicators.
        
        Author: Matteo Z.
      groups:
        - name: Templates/Applications
      items:
        - uuid: 44bd2bd1477f40b6b080a3fa2adcbe80
          name: 'OCP: Critical ClusterOperators raw'
          type: HTTP_AGENT
          key: ocp.critical.clusteroperators.raw
          delay: 5m
          history: '0'
          value_type: TEXT
          trends: '0'
          description: |
            Collects ClusterOperator conditions that indicate a problematic state.
            
            The query returns only ClusterOperators where Available is False or Unknown, or where Degraded or Progressing is True. The result is used as master data for low-level discovery of problematic ClusterOperator conditions.
          timeout: 30s
          url: '{$OCP.THANOS.URL}/api/v1/query'
          query_fields:
            - name: query
              value: 'max by(name,condition) ((cluster_operator_conditions{condition="Available",status=~"False|Unknown"}==1) or (cluster_operator_conditions{condition=~"Degraded|Progressing",status="True"}==1))'
          headers:
            - name: Authorization
              value: 'Bearer {$OCP.TOKEN}'
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
        - uuid: 62b0f1b78d14485f8272a70aa78aeffc
          name: 'OCP: Critical Etcd members status raw'
          type: HTTP_AGENT
          key: ocp.critical.etcd.members.status.raw
          delay: 5m
          history: '0'
          value_type: TEXT
          trends: '0'
          description: |
            Collects etcd members matching a critical condition.
            
            The query detects etcd members where the monitoring target is down or where the member reports no leader. The result is used as master data for low-level discovery of etcd members currently requiring attention.
          timeout: 30s
          url: '{$OCP.THANOS.URL}/api/v1/query'
          query_fields:
            - name: query
              value: 'max by(instance)((up{job=~".*etcd.*"}==bool 0) or (etcd_server_has_leader==bool 0))>0'
          headers:
            - name: Authorization
              value: 'Bearer {$OCP.TOKEN}'
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
        - uuid: d0801ac980064b21874743a50f97e0bc
          name: 'OCP: Critical Jobs status raw'
          type: HTTP_AGENT
          key: ocp.critical.jobs.status.raw
          delay: 5m
          history: '0'
          value_type: TEXT
          trends: '0'
          description: |
            Collects Jobs that are either failed or running longer than the configured threshold.
            
            The query returns only Jobs matching a problematic condition and is used as master data for low-level discovery of failed or long-running Jobs.
          timeout: 30s
          url: '{$OCP.THANOS.URL}/api/v1/query'
          query_fields:
            - name: query
              value: 'label_replace((kube_job_status_failed>0) or (((time()-kube_job_status_start_time) and on(namespace,job_name) (kube_job_status_active>0))>={$OCP.JOB.MAX.RUN.TIME}),"check","any","job_name",".*") or label_replace(kube_job_status_failed>0,"check","failed","job_name",".*") or label_replace(((time()-kube_job_status_start_time) and on(namespace,job_name) (kube_job_status_active>0))>={$OCP.JOB.MAX.RUN.TIME},"check","longrunning","job_name",".*")'
          headers:
            - name: Authorization
              value: 'Bearer {$OCP.TOKEN}'
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
        - uuid: e1420434f4a34beaa61731da210209f1
          name: 'OCP: Critical Node filesystems raw'
          type: HTTP_AGENT
          key: ocp.critical.node.filesystems.raw
          delay: 5m
          history: '0'
          value_type: TEXT
          trends: '0'
          description: |
            Collects node filesystems whose usage is above the configured warning threshold.
            
            The result is used as master data for low-level discovery of filesystems requiring attention. Filesystems, devices and mount points can be excluded through template macros.
          timeout: 30s
          url: '{$OCP.THANOS.URL}/api/v1/query'
          query_fields:
            - name: query
              value: '100 * (1 - node_filesystem_avail_bytes/node_filesystem_size_bytes) >= {$OCP.NODE.FS.WARN}'
          headers:
            - name: Authorization
              value: 'Bearer {$OCP.TOKEN}'
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
        - uuid: d4e87480c08b4d9583940051231a9e7d
          name: 'OCP: Critical Nodes status raw'
          type: HTTP_AGENT
          key: ocp.critical.nodes.status.raw
          delay: 5m
          history: '0'
          value_type: TEXT
          trends: '0'
          description: |
            Collects nodes that are not ready or marked as unschedulable.
            
            The result is used as master data for low-level discovery of nodes currently matching one or more problematic scheduling or readiness conditions.
          timeout: 30s
          url: '{$OCP.THANOS.URL}/api/v1/query'
          query_fields:
            - name: query
              value: 'label_replace(max by (node) ((kube_node_status_condition{condition="Ready",status=~"false|unknown"} == 1) or (kube_node_spec_unschedulable == 1)), "check", "any", "node", ".*") or label_replace(max by (node) (kube_node_status_condition{condition="Ready",status=~"false|unknown"} == 1), "check", "not_ready", "node", ".*") or label_replace(max by (node) (kube_node_spec_unschedulable == 1), "check", "unschedulable", "node", ".*")'
          headers:
            - name: Authorization
              value: 'Bearer {$OCP.TOKEN}'
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
        - uuid: df7930d2bb2f4f18957ca7f4b5c87cc2
          name: 'OCP: Critical Pod CrashLoopBackOff raw'
          type: HTTP_AGENT
          key: ocp.critical.pods.crashloopbackoff.raw
          delay: 5m
          history: '0'
          value_type: TEXT
          trends: '0'
          description: |
            Collects Pods with containers currently in CrashLoopBackOff state.
            
            The result is used as master data for low-level discovery of Pods affected by container restart loop conditions.
          timeout: 30s
          url: '{$OCP.THANOS.URL}/api/v1/query'
          query_fields:
            - name: query
              value: 'sum by(namespace,pod)(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"})>0'
          headers:
            - name: Authorization
              value: 'Bearer {$OCP.TOKEN}'
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
        - uuid: c7aa3a24c2a1466b8f2b9628b739d2a6
          name: 'OCP: Critical Pod problem state raw'
          type: HTTP_AGENT
          key: ocp.critical.pods.problem_state.raw
          delay: 5m
          history: '0'
          value_type: TEXT
          trends: '0'
          description: |
            Collects Pods in problematic states.
            
            The query detects Pods in Pending, Failed or Unknown phase, unschedulable Pods, and Pods that are not ready while excluding successfully completed Pods. The result is used as master data for low-level discovery of problematic Pods.
          timeout: 30s
          url: '{$OCP.THANOS.URL}/api/v1/query'
          query_fields:
            - name: query
              value: 'max by(namespace,pod)(kube_pod_status_phase{phase=~"Pending|Failed|Unknown"} or kube_pod_status_unschedulable or (kube_pod_status_ready{condition="false"} unless on(namespace,pod) kube_pod_status_phase{phase="Succeeded"}))>0'
          headers:
            - name: Authorization
              value: 'Bearer {$OCP.TOKEN}'
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
        - uuid: 9888009c7ca94cfda97f199e5ff3350f
          name: 'OCP: Critical Pod restarts raw'
          type: HTTP_AGENT
          key: ocp.critical.pods.restarts.raw
          delay: 5m
          history: '0'
          value_type: TEXT
          trends: '0'
          description: |
            Collects Pods whose container restart count increased above the configured threshold during the evaluation window.
            
            The result is used as master data for low-level discovery of Pods with excessive recent restarts.
          timeout: 30s
          url: '{$OCP.THANOS.URL}/api/v1/query'
          query_fields:
            - name: query
              value: 'sum by(namespace,pod)(increase(kube_pod_container_status_restarts_total[15m]))>={$OCP.POD.RESTARTS.WARN}'
          headers:
            - name: Authorization
              value: 'Bearer {$OCP.TOKEN}'
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
        - uuid: 2b869a6adeee4e51a0fb9fb2474fbaf4
          name: 'OCP: Critical PV status raw'
          type: HTTP_AGENT
          key: ocp.critical.pv.status.raw
          delay: 5m
          history: '0'
          value_type: TEXT
          trends: '0'
          description: |
            Collects PersistentVolumes in failed or terminating state.
            
            The result is used as master data for low-level discovery of PersistentVolumes requiring attention.
          timeout: 30s
          url: '{$OCP.THANOS.URL}/api/v1/query'
          query_fields:
            - name: query
              value: 'label_replace((kube_persistentvolume_status_phase{phase="Failed"}==1) or (kube_persistentvolume_deletion_timestamp>0),"check","any","persistentvolume",".*") or label_replace(kube_persistentvolume_status_phase{phase="Failed"}==1,"check","failed","persistentvolume",".*") or label_replace(kube_persistentvolume_deletion_timestamp>0,"check","terminating","persistentvolume",".*")'
          headers:
            - name: Authorization
              value: 'Bearer {$OCP.TOKEN}'
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
        - uuid: 4e88746865464276808b0657eb3518dd
          name: 'OCP: Critical PVC usage raw'
          type: HTTP_AGENT
          key: ocp.critical.pvc.usage.raw
          delay: 5m
          history: '0'
          value_type: TEXT
          trends: '0'
          description: |
            Collects PersistentVolumeClaims whose used capacity is above the configured warning threshold.
            
            The result is used as master data for low-level discovery of PVCs requiring storage capacity attention.
          timeout: 30s
          url: '{$OCP.THANOS.URL}/api/v1/query'
          query_fields:
            - name: query
              value: '100 * (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) >= {$OCP.PVC.WARN}'
          headers:
            - name: Authorization
              value: 'Bearer {$OCP.TOKEN}'
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
        - uuid: b7b5f271656c45999dce31d224fccd29
          name: 'OCP: Critical ResourceQuota usage raw'
          type: HTTP_AGENT
          key: ocp.critical.resourcequota.usage.raw
          delay: 10m
          history: '0'
          value_type: TEXT
          trends: '0'
          description: |
            Collects ResourceQuota resources whose usage percentage is above the configured warning threshold.
            
            The query calculates usage against the hard limit and ignores quota resources with an empty or zero hard limit. The result is used as master data for low-level discovery of namespace quota resources requiring attention.
          timeout: 30s
          url: '{$OCP.THANOS.URL}/api/v1/query'
          query_fields:
            - name: query
              value: '((100 * kube_resourcequota{type="used"} / on(namespace,resourcequota,resource) kube_resourcequota{type="hard"}) and on(namespace,resourcequota,resource) (kube_resourcequota{type="hard"} > 0)) >= {$OCP.RQ.WARN}'
          headers:
            - name: Authorization
              value: 'Bearer {$OCP.TOKEN}'
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
        - uuid: 7bdfc770e7fe42d79bbf437c6bd65225
          name: 'OCP: Critical Routes status raw'
          type: HTTP_AGENT
          key: ocp.critical.routes.status.raw
          delay: 5m
          history: '0'
          value_type: TEXT
          trends: '0'
          description: |
            Collects OpenShift Routes that are not admitted.
            
            The result is used as master data for low-level discovery of Routes whose admission status indicates that traffic may not be correctly exposed.
          timeout: 30s
          url: '{$OCP.THANOS.URL}/api/v1/query'
          query_fields:
            - name: query
              value: '((openshift_route_status{type="Admitted",status="True"} == bool 0) == 1)'
          headers:
            - name: Authorization
              value: 'Bearer {$OCP.TOKEN}'
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
        - uuid: c5423d9eb46a4065983304b5b1dd9dbc
          name: 'OCP: Critical Service endpoints status raw'
          type: HTTP_AGENT
          key: ocp.critical.services.endpoints.status.raw
          delay: 5m
          history: '0'
          value_type: TEXT
          trends: '0'
          description: |
            Collects Services with unavailable or not-ready endpoints.
            
            The result is used as master data for low-level discovery of Services that have no available endpoints or one or more endpoints in not-ready state.
          timeout: 30s
          url: '{$OCP.THANOS.URL}/api/v1/query'
          query_fields:
            - name: query
              value: 'label_replace((kube_endpoint_info unless on(namespace,endpoint)(sum by(namespace,endpoint)(kube_endpoint_address_available)>0)) or (sum by(namespace,endpoint)(kube_endpoint_address_not_ready)>0),"check","any","endpoint",".*") or label_replace(kube_endpoint_info unless on(namespace,endpoint)(sum by(namespace,endpoint)(kube_endpoint_address_available)>0),"check","no_available","endpoint",".*") or label_replace(sum by(namespace,endpoint)(kube_endpoint_address_not_ready)>0,"check","not_ready","endpoint",".*")'
          headers:
            - name: Authorization
              value: 'Bearer {$OCP.TOKEN}'
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
        - uuid: f4c71fc1353543e99a87111341c5fafc
          name: 'OCP: Etcd request latency p99'
          type: HTTP_AGENT
          key: ocp.etcd.request.latency.p99
          delay: 5m
          value_type: FLOAT
          units: s
          description: |
            Collects the cluster-level p99 etcd request latency.
            
            This item is not discovery-based and is used to monitor control-plane performance by evaluating high-percentile etcd request duration over the configured Prometheus range.
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.data.result[0].value[1]'
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
          timeout: 30s
          url: '{$OCP.THANOS.URL}/api/v1/query'
          query_fields:
            - name: query
              value: 'histogram_quantile(0.99, sum(rate(etcd_request_duration_seconds_bucket[10m])) by (le)) or vector(0)'
          headers:
            - name: Authorization
              value: 'Bearer {$OCP.TOKEN}'
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: aggregate
          triggers:
            - uuid: 02b6ba8152854bb3ac25a80d4189f180
              expression: 'min(/Template OpenShift Cluster by Thanos API/ocp.etcd.request.latency.p99,10m)>{$OCP.ETCD.LATENCY.P99.WARN}'
              name: 'OCP: Etcd request latency p99 is high'
              priority: AVERAGE
              manual_close: 'YES'
              tags:
                - tag: impact
                  value: performance
        - uuid: 2bbef2034b034b159b346abeb1ac4428
          name: 'OCP: Thanos query health'
          type: HTTP_AGENT
          key: ocp.thanos.query.health
          delay: 3m
          description: |
            Checks whether the Thanos query endpoint is reachable and able to return a valid Prometheus API response.
            
            This item is intentionally not critical-only because it validates the monitoring path used by the whole template.
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.data.result[0].value[1]'
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
          timeout: 30s
          url: '{$OCP.THANOS.URL}/api/v1/query'
          query_fields:
            - name: query
              value: vector(1)
          headers:
            - name: Authorization
              value: 'Bearer {$OCP.TOKEN}'
            - name: Accept
              value: application/json
          tags:
            - tag: item_type
              value: raw
          triggers:
            - uuid: 6d4dfc2fbe0641c8bc7250365ab84b3d
              expression: 'max(/Template OpenShift Cluster by Thanos API/ocp.thanos.query.health,5m)<>1'
              name: 'OCP: Thanos query API is not healthy'
              priority: HIGH
              manual_close: 'YES'
              tags:
                - tag: impact
                  value: availability
      discovery_rules:
        - uuid: 7876e7169d7244ca914dec665ca8d1ed
          name: 'OCP Critical ClusterOperator Discovery'
          type: DEPENDENT
          key: ocp.critical.clusteroperator.discovery
          delay: '0'
          lifetime: 1h
          item_prototypes:
            - uuid: 77457b224a79455982e4eb74a76db53a
              name: 'ClusterOperator {#CO}: {#CO_CONDITION}'
              type: DEPENDENT
              key: 'ocp.clusteroperator.critical[{#CO},{#CO_CONDITION}]'
              delay: '0'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.data.result[?(@.metric.name=="{#CO}" && @.metric.condition=="{#CO_CONDITION}")].value[1].first()'
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '0'
              master_item:
                key: ocp.critical.clusteroperators.raw
              tags:
                - tag: object
                  value: clusteroperator
              trigger_prototypes:
                - uuid: baceb1ccd816465fb3a208af9fe2948b
                  expression: 'min(/Template OpenShift Cluster by Thanos API/ocp.clusteroperator.critical[{#CO},{#CO_CONDITION}],5m)>0'
                  name: 'ClusterOperator {#CO}: Critical condition {#CO_CONDITION}'
                  priority: HIGH
                  manual_close: 'YES'
          master_item:
            key: ocp.critical.clusteroperators.raw
          lld_macro_paths:
            - lld_macro: '{#CO_CONDITION}'
              path: $.condition
            - lld_macro: '{#CO}'
              path: $.name
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.data.result[*].metric'
              error_handler: CUSTOM_VALUE
              error_handler_params: '[]'
        - uuid: ffb2bfafb442446eb75adcdd3437fb1c
          name: 'OCP Critical Etcd Member Discovery'
          type: DEPENDENT
          key: ocp.critical.etcd.member.discovery
          delay: '0'
          lifetime: 1h
          item_prototypes:
            - uuid: fb241f68679e4b8195fa1ece9f52b4e1
              name: 'Etcd member {#ETCD_INSTANCE}: Critical state'
              type: DEPENDENT
              key: 'ocp.etcd.member.critical_state[{#ETCD_INSTANCE}]'
              delay: '0'
              valuemap:
                name: 'OCP status: OK / Problem'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.data.result[?(@.metric.instance=="{#ETCD_INSTANCE}")].value[1].first()'
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '0'
              master_item:
                key: ocp.critical.etcd.members.status.raw
              tags:
                - tag: object
                  value: etcd
              trigger_prototypes:
                - uuid: 6cba5826522d4f1983dfa94e25170337
                  expression: 'max(/Template OpenShift Cluster by Thanos API/ocp.etcd.member.critical_state[{#ETCD_INSTANCE}],5m)>0'
                  name: 'Etcd member {#ETCD_INSTANCE}: Critical state'
                  priority: HIGH
                  manual_close: 'YES'
                  tags:
                    - tag: impact
                      value: availability
          master_item:
            key: ocp.critical.etcd.members.status.raw
          lld_macro_paths:
            - lld_macro: '{#ETCD_INSTANCE}'
              path: $.instance
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.data.result[*].metric'
              error_handler: CUSTOM_VALUE
              error_handler_params: '[]'
        - uuid: 950d4ac2e0334d45adc2f48708efd410
          name: 'OCP Critical Job Status Discovery'
          type: DEPENDENT
          key: ocp.critical.job.status.discovery
          delay: '0'
          filter:
            evaltype: AND
            conditions:
              - macro: '{#NAMESPACE}'
                value: '{$OCP.JOB.NS.MATCHES}'
                formulaid: A
              - macro: '{#NAMESPACE}'
                value: '{$OCP.NS.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: B
          lifetime: 1h
          item_prototypes:
            - uuid: c4f8f8d709b849e1b995e142eedd138b
              name: 'Job {#NAMESPACE}/{#JOB}: Failed count'
              type: DEPENDENT
              key: 'ocp.critical.job.failed[{#NAMESPACE},{#JOB}]'
              delay: '0'
              history: 7d
              value_type: FLOAT
              trends: '0'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.data.result[?(@.metric.namespace=="{#NAMESPACE}" && @.metric.job_name=="{#JOB}" && @.metric.check=="failed")].value[1].first()'
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '0'
              master_item:
                key: ocp.critical.jobs.status.raw
              tags:
                - tag: object
                  value: job
              trigger_prototypes:
                - uuid: 5479022c08884cc981933853d53c877b
                  expression: 'last(/Template OpenShift Cluster by Thanos API/ocp.critical.job.failed[{#NAMESPACE},{#JOB}])>0'
                  name: 'Job {#NAMESPACE}/{#JOB}: Failed'
                  priority: AVERAGE
                  manual_close: 'YES'
                  tags:
                    - tag: impact
                      value: availability
            - uuid: c00abb713ff24f7bb96fb2180db86ef7
              name: 'Job {#NAMESPACE}/{#JOB}: Running seconds'
              type: DEPENDENT
              key: 'ocp.critical.job.running.seconds[{#NAMESPACE},{#JOB}]'
              delay: '0'
              history: 7d
              value_type: FLOAT
              trends: '0'
              units: s
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.data.result[?(@.metric.namespace=="{#NAMESPACE}" && @.metric.job_name=="{#JOB}" && @.metric.check=="longrunning")].value[1].first()'
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '0'
              master_item:
                key: ocp.critical.jobs.status.raw
              tags:
                - tag: object
                  value: job
              trigger_prototypes:
                - uuid: cecd7f8b9303445191a2c9f59c1d396a
                  expression: 'last(/Template OpenShift Cluster by Thanos API/ocp.critical.job.running.seconds[{#NAMESPACE},{#JOB}])>={$OCP.JOB.MAX.RUN.TIME}'
                  name: 'Job {#NAMESPACE}/{#JOB}: Running for more than {$OCP.JOB.MAX.RUN.TIME} seconds'
                  priority: AVERAGE
                  manual_close: 'YES'
                  tags:
                    - tag: impact
                      value: performance
          master_item:
            key: ocp.critical.jobs.status.raw
          lld_macro_paths:
            - lld_macro: '{#JOB}'
              path: $.job_name
            - lld_macro: '{#NAMESPACE}'
              path: $.namespace
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.data.result[?(@.metric.check=="any")].metric'
              error_handler: CUSTOM_VALUE
              error_handler_params: '[]'
        - uuid: 7453f589170441cfa814347a7cca1ff8
          name: 'OCP Critical Node Filesystem Discovery'
          type: DEPENDENT
          key: ocp.critical.node.filesystem.discovery
          delay: '0'
          filter:
            conditions:
              - macro: '{#FS_DEVICE}'
                value: '{$OCP.NODE.FS.DEVICE.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: A
              - macro: '{#FS_FSTYPE}'
                value: '{$OCP.NODE.FS.FSTYPE.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: B
              - macro: '{#FS_MOUNTPOINT}'
                value: '{$OCP.NODE.FS.MOUNTPOINT.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: C

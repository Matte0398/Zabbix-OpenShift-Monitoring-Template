        - tag: datasource
          value: thanos
        - tag: platform
          value: openshift
        - tag: target
          value: critical-object
      macros:
        - macro: "{$OCP.CO.PROGRESSING.MAX.TIME}"
          value: "1800"
          description: "Maximum time, in seconds, a ClusterOperator can remain in Progressing=True before triggering an alert."
        - macro: "{$OCP.CRONJOB.MAX.LAST.SUCCESS}"
          value: "86400"
          description: "Maximum allowed time, in seconds, since the last successful CronJob run."
        - macro: "{$OCP.CRONJOB.NS.MATCHES}"
          value: ^$
          description: "Regex used to include namespaces in the critical CronJob discovery. Default ^$ disables CronJob discovery."
        - macro: "{$OCP.ETCD.LATENCY.P99.WARN}"
          value: "1"
          description: "Warning threshold in seconds for etcd p99 latency."
        - macro: "{$OCP.JOB.MAX.RUN.TIME}"
          value: "1800"
          description: "The number of seconds after which an active job is considered long-running."
        - macro: "{$OCP.JOB.NS.MATCHES}"
          value: ".*"
          description: "Regex for the namespaces in which to enable critical job discovery."
        - macro: "{$OCP.NODE.FS.CRIT}"
          value: "90"
          description: "Critical threshold for file system node usage, expressed as a percentage."
        - macro: "{$OCP.NODE.FS.DEVICE.NOT_MATCHES}"
          value: ^(rootfs)$
          description: "Devices to exclude from filesystem node queries."
        - macro: "{$OCP.NODE.FS.FSTYPE.NOT_MATCHES}"
          value: "^(tmpfs|overlay|squashfs|nsfs|proc|sysfs|devtmpfs|cgroup2?|mqueue|hugetlbfs|securityfs|debugfs|tracefs)$"
          description: "File system types to exclude from node file system queries."
        - macro: "{$OCP.NODE.FS.MOUNTPOINT.NOT_MATCHES}"
          value: "^/run($|/.*)|^/var/lib/kubelet/pods/.*|^/var/lib/containers/storage/.*|^/proc($|/.*)|^/sys($|/.*)|^/dev($|/.*)"
          description: "Mount points to exclude from filesystem node queries."
        - macro: "{$OCP.NODE.FS.WARN}"
          value: "75"
          description: "Warning threshold for file system node usage, expressed as a percentage."
        - macro: "{$OCP.NS.NOT_MATCHES}"
          value: ^$
          description: "Global regex to exclude namespaces from problem-based discovery. ^$ = excludes nothing."
        - macro: "{$OCP.POD.NS.MATCHES}"
          value: ".*"
          description: "Regex for the namespaces in which to enable critical Pod discovery."
        - macro: "{$OCP.POD.RESTARTS.WARN}"
          value: "3"
          description: "Restart threshold set to 15 minutes for generating critical Pod objects."
        - macro: "{$OCP.PVC.CRIT}"
          value: "90"
          description: "Critical threshold for PVC use, expressed as a percentage."
        - macro: "{$OCP.PVC.NS.MATCHES}"
          value: ".*"
          description: "Regex for the namespaces in which to enable critical PVC discovery."
        - macro: "{$OCP.PVC.WARN}"
          value: "75"
          description: "Warning threshold for PVC use, expressed as a percentage."
        - macro: "{$OCP.ROUTE.NS.MATCHES}"
          value: ".*"
          description: "Regex for the namespaces in which to enable critical route discovery."
        - macro: "{$OCP.RQ.CRIT}"
          value: "90"
          description: "ResourceQuota usage critical threshold, expressed as a percentage."
        - macro: "{$OCP.RQ.NS.MATCHES}"
          value: ".*"
          description: "Regex for the namespaces in which to enable critical ResourceQuota discovery."
        - macro: "{$OCP.RQ.RESOURCE.MATCHES}"
          value: ".*"
          description: "Regular expression for the ResourceQuota resources to include."
        - macro: "{$OCP.RQ.RESOURCE.NOT_MATCHES}"
          value: ^$
          description: "Regular expression for ResourceQuota resources to exclude. ^$ = excludes nothing."
        - macro: "{$OCP.RQ.WARN}"
          value: "75"
          description: "ResourceQuota usage warning threshold, expressed as a percentage."
        - macro: "{$OCP.SVC.NOT_MATCHES}"
          value: ^$
          description: "Regex to exclude services/endpoints from Service discovery. ^$ = excludes nothing."
        - macro: "{$OCP.SVC.NS.MATCHES}"
          value: ".*"
          description: "Regex for the namespaces in which to enable critical discovery of service endpoints."
        - macro: "{$OCP.THANOS.URL}"
          value: "https://thanos-querier.example.com"
          description: "Thanos Querier base URL."
        - macro: "{$OCP.TOKEN}"
          type: SECRET_TEXT
          description: "Bearer token for querying the Thanos/OpenShift monitoring API."
      valuemaps:
        - uuid: cad2a9676ab44bafae15a3c830d2e7c1
          name: "OCP status: Healthy / Unhealthy"
          mappings:
            - value: "0"
              newvalue: Unhealthy
            - value: "1"
              newvalue: Healthy
